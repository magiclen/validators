name: CI-version

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        toolchain:
          - stable
          - nightly
        features:
          - --features test
          - --features serde --features test
          - --features rocket --features test
          - --no-default-features --features base32 --features derive --features test
          - --no-default-features --features base32_decoded --features derive --features test
          - --no-default-features --features base64 --features derive --features test
          - --no-default-features --features base64_decoded --features derive --features test
          - --no-default-features --features base64_url --features derive --features test
          - --no-default-features --features base64_url_decoded --features derive --features test
          - --no-default-features --features bit --features derive --features test
          - --no-default-features --features boolean --features derive --features test
          - --no-default-features --features byte --features derive --features test
          - --no-default-features --features domain --features derive --features test
          - --no-default-features --features email --features derive --features test
          - --no-default-features --features host --features derive --features test
          - --no-default-features --features http_url --features derive --features test
          - --no-default-features --features http_ftp_url --features derive --features test
          - --no-default-features --features ip --features derive --features test
          - --no-default-features --features ipv4 --features derive --features test
          - --no-default-features --features ipv6 --features derive --features test
          - --no-default-features --features json --features derive --features test
          - --no-default-features --features length --features derive --features test
          - --no-default-features --features line --features derive --features test
          - --no-default-features --features mac_address --features derive --features test
          - --no-default-features --features number --features derive --features test
          - --no-default-features --features phone --features derive --features test
          - --no-default-features --features regex --features derive --features test
          - --no-default-features --features semver --features derive --features test
          - --no-default-features --features semver_req --features derive --features test
          - --no-default-features --features signed_integer --features derive --features test
          - --no-default-features --features text --features derive --features test
          - --no-default-features --features unsigned_integer --features derive --features test
          - --no-default-features --features url --features derive --features test
          - --no-default-features --features uuid --features derive --features test
    name: Test ${{ matrix.toolchain }} on ${{ matrix.os }} (${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
      - run: cargo test --release ${{ matrix.features }}
      - run: cargo doc --release ${{ matrix.features }}

  MSRV:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        toolchain:
          - 1.89
        features:
          -
          - --features serde
          - --features rocket
          - --no-default-features --features base32
          - --no-default-features --features base32_decoded
          - --no-default-features --features base64
          - --no-default-features --features base64_decoded
          - --no-default-features --features base64_url
          - --no-default-features --features base64_url_decoded
          - --no-default-features --features bit
          - --no-default-features --features boolean
          - --no-default-features --features byte
          - --no-default-features --features domain
          - --no-default-features --features email
          - --no-default-features --features host
          - --no-default-features --features http_url
          - --no-default-features --features http_ftp_url
          - --no-default-features --features ip
          - --no-default-features --features ipv4
          - --no-default-features --features ipv6
          - --no-default-features --features json
          - --no-default-features --features length
          - --no-default-features --features line
          - --no-default-features --features mac_address
          - --no-default-features --features number
          - --no-default-features --features phone
          - --no-default-features --features regex
          - --no-default-features --features semver
          - --no-default-features --features semver_req
          - --no-default-features --features signed_integer
          - --no-default-features --features text
          - --no-default-features --features unsigned_integer
          - --no-default-features --features url
          - --no-default-features --features uuid
    name: Test ${{ matrix.toolchain }} on ${{ matrix.os }} (${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
      - run: cargo test --release --lib --bins ${{ matrix.features }}